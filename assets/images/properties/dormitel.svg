<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dormSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5fc"/>
      <stop offset="100%" stop-color="#dceaf8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#dormSky)"/>
  <rect x="0" y="220" width="400" height="60" fill="#c5deef"/>
  <!-- Compact, friendly low-rise building -->
  <rect x="100" y="100" width="200" height="130" rx="6" fill="#3b7dd8"/>
  <rect x="100" y="100" width="200" height="16" rx="4" fill="#16324f"/>
  <!-- Simple square window grid, 4x3 -->
  <g fill="#f0f6fe">
    <rect x="118" y="130" width="26" height="26" rx="3"/>
    <rect x="156" y="130" width="26" height="26" rx="3"/>
    <rect x="194" y="130" width="26" height="26" rx="3"/>
    <rect x="232" y="130" width="26" height="26" rx="3"/>
    <rect x="118" y="170" width="26" height="26" rx="3"/>
    <rect x="156" y="170" width="26" height="26" rx="3"/>
    <rect x="194" y="170" width="26" height="26" rx="3"/>
    <rect x="232" y="170" width="26" height="26" rx="3"/>
  </g>
  <!-- Entrance -->
  <rect x="180" y="200" width="40" height="30" rx="2" fill="#16324f"/>
  <rect x="187" y="206" width="26" height="24" fill="#f0a857"/>
  <!-- Little awning -->
  <rect x="172" y="194" width="56" height="8" rx="2" fill="#f0a857"/>
</svg>
